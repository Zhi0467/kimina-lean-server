[project]
name = "kimina-client"
version = "0.1.0"
description = "Client library and shared wire schemas for the Kimina Lean Server / exec backend."
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.10.0",
    "tenacity>=9.1.2",
    "pygments>=2.0.0",
    "colorama>=0.4.6",
    "tabulate>=0.9.0",
    "tqdm>=4.0.0",
    "typing-extensions>=4.0.0; python_version < '3.12'",
]

[project.optional-dependencies]
# Convenience helpers (dataset loading, benchmark runners) that the /exec path
# does not need. Install with `kimina-client[benchmark]`.
benchmark = [
    "datasets>=4.0.0",
    "pandas>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kimina_client"]
